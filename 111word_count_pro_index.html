<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Word Count Pro</title>
  
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#f7f7f9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Count Pro">
  
  <script>
    // Publication note: this app is an independent word counter UI.
    // Keep bundled third-party license notices when redistributing this file.
    const iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#000000"/><circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-width="40" stroke-dasharray="800" stroke-dashoffset="200" stroke-linecap="round"/><path d="M256 160v192M160 256h192" stroke="#fff" stroke-width="32" stroke-linecap="round"/></svg>';
    const iconUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(iconSvg);
    const manifest = {
      name: "Word Count Pro",
      short_name: "Count",
      start_url: ".",
      display: "standalone",
      background_color: "#000000",
      theme_color: "#000000",
      icons: [{ src: iconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
    };
    document.write('<link rel="manifest" href="data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest)) + '">');
    document.write('<link rel="apple-touch-icon" href="' + iconUrl + '">');
  </script>

  <script>
    // テーマ早期適用：描画前に保存済みテーマを反映し、ライト⇔ダークのちらつきを防ぐ
    (function () {
      try {
        var s = localStorage.getItem('wordCountProWhiteSettings');
        var theme = s ? (JSON.parse(s).theme || 'light') : 'light';
        var dark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      } catch (e) {}
    })();
  </script>

  <style>
    /* Ceramic White Glass UI */
    .app-scene {
      background: #ffffff;
    }
    .dark .app-scene {
      background:
        linear-gradient(180deg, rgba(20, 20, 24, 0.92), rgba(5, 5, 8, 1) 58%, #000),
        #000;
    }
    .ambient-wash {
      position: absolute;
      inset: -18% !important;
      width: auto !important;
      height: auto !important;
      border-radius: 0 !important;
      filter: blur(38px) saturate(122%) !important;
      pointer-events: none;
      transform: translateZ(0);
    }
    .ambient-wash-primary {
      background: transparent;
      animation: none;
    }
    .ambient-wash-secondary {
      background: transparent;
      animation: none;
    }
    .dark .ambient-wash-primary {
      background:
        linear-gradient(125deg, rgba(10, 132, 255, 0.18), transparent 44%),
        linear-gradient(25deg, transparent 32%, rgba(255, 255, 255, 0.07), transparent 68%);
    }
    .dark .ambient-wash-secondary {
      background:
        linear-gradient(215deg, rgba(255, 255, 255, 0.08), transparent 42%),
        linear-gradient(145deg, transparent 32%, rgba(94, 92, 230, 0.16), transparent 70%);
    }
    .soft-glass {
      background: rgba(255, 255, 255, 0.985);
      backdrop-filter: blur(24px) saturate(120%);
      -webkit-backdrop-filter: blur(24px) saturate(120%);
      border: 0.5px solid rgba(17, 24, 39, 0.045);
      box-shadow:
        0 1px 1px rgba(0, 0, 0, 0.012),
        0 10px 22px -22px rgba(17, 17, 24, 0.10),
        inset 0 1px 1px rgba(255, 255, 255, 1);
    }
    .dark .soft-glass {
      background:
        linear-gradient(135deg, rgba(58, 58, 64, 0.62), rgba(16, 16, 20, 0.44)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0));
      border: 0.5px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 1px 1px rgba(0, 0, 0, 0.3),
        0 20px 48px -18px rgba(0, 0, 0, 0.62),
        0 6px 22px -18px rgba(10, 132, 255, 0.30),
        inset 0 1.2px 1px rgba(255, 255, 255, 0.28),
        inset 0 -1px 1px rgba(0, 0, 0, 0.3),
        inset 0 0 36px rgba(255, 255, 255, 0.04);
    }

    .glass-specular {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    /* Specular sheen: ぼかし背景の上・コンテンツの下(z-index:-1)に光沢の帯と角の反射を重ねる */
    .glass-specular::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0) 42%),
        radial-gradient(120% 90% at 0% 0%, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0) 38%);
    }
    .dark .glass-specular::after {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0) 42%),
        radial-gradient(120% 90% at 0% 0%, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0) 38%);
    }

    .editor-shell {
      isolation: isolate;
      contain: layout;
      transition: margin .32s cubic-bezier(.32,.72,0,1);
    }
    .editor-panel {
      background: #ffffff;
      border-color: rgba(17, 24, 39, 0.04);
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      box-shadow: none;
      transition: border-color .25s ease, box-shadow .25s ease, border-radius .32s cubic-bezier(.32,.72,0,1);
    }
    .dark .editor-panel {
      box-shadow:
        0 24px 55px -28px rgba(0, 0, 0, 0.72),
        inset 0 1px 1px rgba(255, 255, 255, 0.20),
        inset 0 -1px 1px rgba(0, 0, 0, 0.36);
    }
    .editor-shell.is-active .editor-panel {
      background: #ffffff;
      border-color: rgba(17, 24, 39, 0.04);
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      box-shadow: none;
    }
    .dark .editor-shell.is-active .editor-panel {
      box-shadow:
        0 26px 60px -28px rgba(10, 132, 255, 0.42),
        0 0 0 1px rgba(10, 132, 255, 0.16),
        inset 0 1px 1px rgba(255, 255, 255, 0.22),
        inset 0 -1px 1px rgba(0, 0, 0, 0.38);
    }
    .editor-layer {
      padding: 18px 56px 56px 16px !important;
    }
    @media (min-width: 768px) {
      .editor-layer {
        padding: 32px 80px 64px 32px !important;
      }
    }
    .editor-meta-bar {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 10px;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }
    .editor-meta-group {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }
    .editor-meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      color: rgba(60, 60, 67, 0.78);
      background: rgba(255, 255, 255, 0.86);
      border: 0.5px solid rgba(255, 255, 255, 0.92);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
      box-shadow:
        0 8px 22px -18px rgba(0, 0, 0, 0.22),
        inset 0 1px 1px rgba(255, 255, 255, 0.94);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .editor-meta-chip.is-live {
      color: #007AFF;
      background: rgba(0, 122, 255, 0.11);
      border-color: rgba(0, 122, 255, 0.18);
    }
    .dark .editor-meta-chip {
      color: rgba(235, 235, 245, 0.78);
      background: rgba(44, 44, 48, 0.72);
      border-color: rgba(255, 255, 255, 0.12);
